<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background: transparent
        }

        .page-header {
            margin-bottom: 25px
        }

        .page-header h2 {
            color: #333;
            margin-bottom: 5px
        }

        .page-header p {
            color: #666;
            font-size: 14px
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0
        }

        .card h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .card h3 .card-icon {
            font-size: 24px
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 14px
        }

        .info-label {
            color: #666;
            font-weight: 500
        }

        .info-value {
            color: #333;
            font-weight: 600
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block
        }

        .badge-success {
            background: #d4edda;
            color: #155724
        }

        .badge-info {
            background: #d1ecf1;
            color: #0c5460
        }

        .badge-purple {
            background: #e8d5f5;
            color: #6f42c1
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
            margin-bottom: 8px
        }

        button:hover {
            opacity: .9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .1)
        }

        .btn-warning {
            background: #ffc107;
            color: #333
        }

        .btn-danger {
            background: #dc3545;
            color: white
        }

        .btn-primary {
            background: #667eea;
            color: white
        }

        .btn-info {
            background: #17a2b8;
            color: white
        }

        .btn-success {
            background: #28a745;
            color: white
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .6);
            z-index: 1000;
            justify-content: center;
            align-items: center
        }

        .modal-overlay.active {
            display: flex
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 450px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333
        }

        .form-group {
            margin-bottom: 15px;
            position: relative
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
            font-size: 13px
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 38px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            width: auto;
            margin: 0;
            box-shadow: none;
        }

        .password-toggle:hover {
            opacity: 0.7;
            transform: none;
            box-shadow: none;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px
        }

        .modal-buttons button {
            flex: 1
        }

        .error-text {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none
        }

        .error-text.show {
            display: block
        }

        .success-text {
            color: #28a745;
            font-size: 13px;
            margin-top: 10px;
            display: none;
            text-align: center
        }

        .success-text.show {
            display: block
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 5px;
            transition: all .3s
        }

        .strength-weak {
            background: #dc3545;
            width: 25%
        }

        .strength-fair {
            background: #ffc107;
            width: 50%
        }

        .strength-good {
            background: #17a2b8;
            width: 75%
        }

        .strength-strong {
            background: #28a745;
            width: 100%
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn .4s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2)
        }

        .toast.success {
            background: #28a745
        }

        .toast.error {
            background: #dc3545
        }

        .toast.warning {
            background: #ffc107;
            color: #333
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }
    </style>
</head>

<body>
    <div class="page-header">
        <h2>⚙️ Settings</h2>
        <p>Account management and system configuration</p>
    </div>
    <div class="settings-grid">
        <div class="card">
            <h3><span class="card-icon">ℹ️</span> System Information</h3>
            <div class="info-row"><span class="info-label">Status</span><span class="badge badge-success">Online</span>
            </div>
            <div class="info-row"><span class="info-label">Version</span><span class="info-value">1.0.0</span></div>
            <div class="info-row"><span class="info-label">Date</span><span class="info-value" id="currentDate"></span>
            </div>
            <div class="info-row"><span class="info-label">Time</span><span class="info-value" id="currentTime"></span>
            </div>
            <div class="info-row"><span class="info-label">Storage</span><span class="badge badge-info">JSON
                    Files</span></div>
        </div>
        <div class="card">
            <h3><span class="card-icon">👤</span> My Account</h3>
            <div class="info-row"><span class="info-label">Name</span><span class="info-value" id="myName"></span></div>
            <div class="info-row"><span class="info-label">Username</span><span class="info-value"
                    id="myUsername"></span></div>
            <div class="info-row"><span class="info-label">Role</span><span class="badge badge-purple"
                    id="myRole"></span></div>
        </div>
        <div class="card">
            <h3><span class="card-icon">🔐</span> Security</h3>
            <p style="color:#666;font-size:13px;margin-bottom:15px;">Manage your account security</p>
            <button class="btn-warning" onclick="openPasswordModal()">🔑 Change Password</button>
            <button class="btn-primary" onclick="openProfileModal()">✏️ Edit Profile</button>
        </div>
        <div class="card">
            <h3><span class="card-icon">💾</span> Data & Cache</h3>
            <p style="color:#666;font-size:13px;margin-bottom:15px;">Manage local browser data</p>
            <button class="btn-info" onclick="clearCache()">🗑️ Clear Cache</button>
            <button class="btn-danger" onclick="handleLogout()">⏻ Logout</button>
        </div>
    </div>

    <!-- Password Change Modal -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-content">
            <h3>🔑 Change Password</h3>
            <div class="form-group">
                <label>Current Password *</label>
                <input type="password" id="currentPwd" placeholder="Enter current password"
                    autocomplete="current-password">
                <button class="password-toggle" onclick="togglePassword('currentPwd', this)" type="button">👁️</button>
            </div>
            <div class="form-group">
                <label>New Password *</label>
                <input type="password" id="newPwd" placeholder="Min 8 characters" autocomplete="new-password"
                    onkeyup="checkPasswordStrength()">
                <button class="password-toggle" onclick="togglePassword('newPwd', this)" type="button">👁️</button>
                <div class="password-strength" id="passwordStrength"></div>
            </div>
            <div class="form-group">
                <label>Confirm New Password *</label>
                <input type="password" id="confirmPwd" placeholder="Re-enter new password" autocomplete="new-password">
                <button class="password-toggle" onclick="togglePassword('confirmPwd', this)" type="button">👁️</button>
            </div>
            <div class="error-text" id="pwdError"></div>
            <div class="success-text" id="pwdSuccess"></div>
            <div class="modal-buttons">
                <button class="btn-danger" onclick="closePasswordModal()">Cancel</button>
                <button class="btn-success" id="updatePwdBtn" onclick="changePassword()">🔑 Update Password</button>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-content">
            <h3>✏️ Edit Profile</h3>
            <div class="form-group"><label>Full Name</label><input type="text" id="editFullName"
                    placeholder="Your full name"></div>
            <div class="form-group"><label>Phone Number</label><input type="text" id="editPhone"
                    placeholder="Phone number"></div>
            <div class="form-group"><label>Gender</label><select id="editGender"
                    style="width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;">
                    <option value="neutral">Neutral</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select></div>
            <div class="form-group"><label>Bio</label><textarea id="editBio" rows="3" placeholder="Short bio"
                    style="width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;"></textarea>
            </div>
            <div class="error-text" id="profileError"></div>
            <div class="modal-buttons"><button class="btn-danger" onclick="closeProfileModal()">Cancel</button><button
                    class="btn-success" onclick="saveProfile()">💾 Save Profile</button></div>
        </div>
    </div>

    <script>
        if (window.parent === window) { window.location.href = '/dashboard.html' }
        var API_URL = '/api',
            token = new URLSearchParams(window.location.search).get('token') || sessionStorage.getItem('token') || (window.parent && window.parent.token) || '',
            user = JSON.parse(sessionStorage.getItem('user') || '{}');
        if (token) { sessionStorage.setItem('token', token); }
        init();

        function init() { updateDateTime(), setInterval(updateDateTime, 1000), document.getElementById('myName').textContent = user.full_name || '-', document.getElementById('myUsername').textContent = '@' + (user.username || '-'), document.getElementById('myRole').textContent = user.role || '-', loadUserData() }

        function updateDateTime() { var e = new Date; document.getElementById('currentDate').textContent = e.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }), document.getElementById('currentTime').textContent = e.toLocaleTimeString() }

        async function loadUserData() { try { var e = await (await fetch(API_URL + '/me', { headers: { 'Authorization': 'Bearer ' + token } })).json(); sessionStorage.setItem('user', JSON.stringify(e)), document.getElementById('editFullName').value = e.full_name || '', document.getElementById('editPhone').value = e.phone_number || '', document.getElementById('editGender').value = e.gender || 'neutral', document.getElementById('editBio').value = e.bio || '' } catch (e) { document.getElementById('editFullName').value = user.full_name || '', document.getElementById('editPhone').value = user.phone_number || '', document.getElementById('editGender').value = user.gender || 'neutral', document.getElementById('editBio').value = user.bio || '' } }

        function togglePassword(inputId, btn) {
            var input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        function openPasswordModal() { document.getElementById('currentPwd').value = '', document.getElementById('newPwd').value = '', document.getElementById('confirmPwd').value = '', document.getElementById('pwdError').classList.remove('show'), document.getElementById('pwdSuccess').classList.remove('show'), document.getElementById('passwordStrength').className = 'password-strength', document.getElementById('passwordModal').classList.add('active') }

        function closePasswordModal() { document.getElementById('passwordModal').classList.remove('active') }

        function checkPasswordStrength() { var e = document.getElementById('newPwd').value, t = document.getElementById('passwordStrength'); if (!e) { t.className = 'password-strength'; return } var a = 0; e.length >= 8 && a++, e.length >= 12 && a++, /[A-Z]/.test(e) && a++, /[0-9]/.test(e) && a++, /[^A-Za-z0-9]/.test(e) && a++, a <= 1 ? t.className = 'password-strength strength-weak' : a === 2 ? t.className = 'password-strength strength-fair' : a === 3 ? t.className = 'password-strength strength-good' : t.className = 'password-strength strength-strong' }

        async function changePassword() {
            var e = document.getElementById('pwdError'),
                t = document.getElementById('pwdSuccess'),
                a = document.getElementById('updatePwdBtn');
            e.classList.remove('show'), t.classList.remove('show');
            var o = document.getElementById('currentPwd').value,
                s = document.getElementById('newPwd').value,
                r = document.getElementById('confirmPwd').value;
            if (!o || !s || !r) { e.textContent = 'All fields are required.'; e.classList.add('show'); return }
            if (s.length < 8) { e.textContent = 'Password must be at least 8 characters.'; e.classList.add('show'); return }
            if (s !== r) { e.textContent = 'Passwords do not match.'; e.classList.add('show'); return }
            a.disabled = true;
            a.textContent = 'Updating...';
            try {
                var i = await (await fetch(API_URL + '/change-password', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ currentPassword: o, newPassword: s }) })).json();
                if (i.success) {
                    t.textContent = 'Password changed! Logging out...';
                    t.classList.add('show');
                    showToast('Password changed successfully! Please login with new password.', 'success');
                    // Clear ALL storage and redirect to login
                    setTimeout(function () {
                        sessionStorage.clear();
                        localStorage.clear();
                        // If in iframe, redirect parent; otherwise redirect self
                        if (window.parent && window.parent !== window) {
                            window.parent.location.href = '/';
                        } else {
                            window.location.href = '/';
                        }
                    }, 1500);
                } else {
                    e.textContent = i.error || 'Failed';
                    e.classList.add('show');
                    a.disabled = false;
                    a.textContent = '🔑 Update Password';
                }
            } catch (t) {
                e.textContent = 'Connection error';
                e.classList.add('show');
                a.disabled = false;
                a.textContent = '🔑 Update Password';
            }
        }

        function openProfileModal() { loadUserData(), document.getElementById('profileError').classList.remove('show'), document.getElementById('profileModal').classList.add('active') }

        function closeProfileModal() { document.getElementById('profileModal').classList.remove('active') }

        async function saveProfile() { var e = document.getElementById('profileError'); e.classList.remove('show'); var t = document.getElementById('editFullName').value.trim(), a = document.getElementById('editPhone').value.trim(), o = document.getElementById('editGender').value, s = document.getElementById('editBio').value.trim(); if (!t) { e.textContent = 'Full name is required.'; e.classList.add('show'); return } try { var r = await (await fetch(API_URL + '/users/' + user.id, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ full_name: t, phone_number: a, gender: o, bio: s }) })).json(); r.success ? (user.full_name = t, user.phone_number = a, user.gender = o, user.bio = s, sessionStorage.setItem('user', JSON.stringify(user)), document.getElementById('myName').textContent = t, showToast('Profile updated!', 'success'), closeProfileModal()) : (e.textContent = r.error || 'Failed', e.classList.add('show')) } catch (t) { e.textContent = 'Connection error', e.classList.add('show') } }

        function clearCache() { if (confirm('Clear browser cache? You will stay logged in.')) { var t = sessionStorage.getItem('token'); var u = sessionStorage.getItem('user'); sessionStorage.clear(); if (t) sessionStorage.setItem('token', t); if (u) sessionStorage.setItem('user', u); var e = Object.keys(localStorage); e.forEach(function (e) { 'token' !== e && 'user' !== e && localStorage.removeItem(e) }), showToast('Cache cleared!', 'success') } }

        async function handleLogout() { if (!confirm('Logout?')) return; try { await fetch(API_URL + '/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }) } catch (e) { } sessionStorage.clear(); localStorage.clear(); if (window.parent && window.parent !== window) { window.parent.location.href = '/' } else { window.location.href = '/' } }

        function showToast(e, t) { t = t || 'success'; var a = document.createElement('div'); a.className = 'toast ' + t, a.textContent = e, document.body.appendChild(a), setTimeout(function () { a.parentNode && a.parentNode.removeChild(a) }, 3000) }

        document.querySelectorAll('.modal-overlay').forEach(function (e) { e.addEventListener('click', function (t) { t.target === this && this.classList.remove('active') }) });
        document.addEventListener('keydown', function (e) { e.key === 'Escape' && document.querySelectorAll('.modal-overlay.active').forEach(function (e) { e.classList.remove('active') }) });
    </script>
</body>

</html>
